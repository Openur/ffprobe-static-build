name: Build Legacy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-legacy.yml"
      - "platforms/**"
      - "**.props"
      - "**.csproj"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/build-legacy.yml"
      - "platforms/**"
      - "**.props"
      - "**.csproj"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

env:
  FFMPEG_VERSION: s5.1.10

permissions:
  contents: read
  packages: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.variables.outputs.version }}
    steps:
      - name: Setup variables
        id: variables
        shell: bash
        run: |
          version="${FFMPEG_VERSION#s}"

          if [[ $version =~ ^[0-9]+\.[0-9]+$ ]]; then
            version="${version}.0"
          fi

          echo "version=$version" >> $GITHUB_OUTPUT

  build_linux:
    runs-on: ${{ startsWith(matrix.architecture, 'arm') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - arm
          - arm64
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout FFmpeg
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: mynameisbogdan/ServarrFFmpeg
          ref: ${{ env.FFMPEG_VERSION }}
          path: ffmpeg-src

      - name: Build
        uses: docker://mirror.gcr.io/debian:11
        env:
          LINUX_COMPILER_SUFFIX: "-10"
        with:
          args: /bin/sh -c "apt-get update && apt-get upgrade --yes && apt-get install --yes --no-install-suggests --no-install-recommends ca-certificates wget build-essential cmake pkg-config gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf libc6-dev-armhf-cross meson ninja-build nasm && platforms/linux/build.sh ${{ matrix.architecture }}"

      - name: List artifacts
        run: file platforms/*/build/opt/ffmpeg/bin/*

      - name: Display build information
        run: |
          platforms/linux/build/opt/ffmpeg/bin/ffprobe -hide_banner -version
          platforms/linux/build/opt/ffmpeg/bin/ffprobe -hide_banner -buildconf
          platforms/linux/build/opt/ffmpeg/bin/ffprobe -hide_banner -bsfs

      - name: Prepare build artifact
        run: mkdir -p build/linux-${{ matrix.architecture }} && cp platforms/linux/build/opt/ffmpeg/bin/ffprobe build/linux-${{ matrix.architecture }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-linux-${{ matrix.architecture }}
          path: build
          if-no-files-found: error

  build_windows:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - x64
          - x86
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout FFmpeg
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: mynameisbogdan/ServarrFFmpeg
          ref: ${{ env.FFMPEG_VERSION }}
          path: ffmpeg-src

      - name: Build
        uses: docker://mirror.gcr.io/debian:11
        with:
          args: /bin/sh -c "apt-get update && apt-get upgrade --yes && apt-get install --yes --no-install-suggests --no-install-recommends ca-certificates wget build-essential cmake pkg-config gcc-mingw-w64 g++-mingw-w64 meson ninja-build nasm && platforms/windows/build.sh ${{ matrix.architecture }}"

      - name: List artifacts
        run: file platforms/*/build/opt/ffmpeg/bin/*

      - name: Prepare build artifact
        run: mkdir -p build/win-${{ matrix.architecture }} && cp platforms/windows/build/opt/ffmpeg/bin/ffprobe.exe build/win-${{ matrix.architecture }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-win-${{ matrix.architecture }}
          path: build
          if-no-files-found: error

  build_freebsd:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout FFmpeg
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: mynameisbogdan/ServarrFFmpeg
          ref: ${{ env.FFMPEG_VERSION }}
          path: ffmpeg-src

      - name: Build
        uses: vmactions/freebsd-vm@b84ab5559b5a1bb4b8ee2737d2506a16e1737636 # v1.4.8
        with:
          release: 13.5
          usesh: true
          arch: ${{ matrix.architecture == 'arm64' && 'aarch64' || 'x86_64' }}
          prepare: |
            pkg install -y bash gmake pkgconf nasm meson
          run: |
            ./platforms/freebsd/build.sh ${{ matrix.architecture }}

            ./platforms/freebsd/build/opt/ffmpeg/bin/ffprobe -hide_banner -version
            ./platforms/freebsd/build/opt/ffmpeg/bin/ffprobe -hide_banner -buildconf
            ./platforms/freebsd/build/opt/ffmpeg/bin/ffprobe -hide_banner -bsfs

      - name: List artifacts
        run: file platforms/*/build/opt/ffmpeg/bin/*

      - name: Prepare build artifact
        run: mkdir -p build/freebsd-${{ matrix.architecture }} && cp platforms/freebsd/build/opt/ffmpeg/bin/ffprobe build/freebsd-${{ matrix.architecture }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-freebsd-${{ matrix.architecture }}
          path: build
          if-no-files-found: error

  build_mac:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - arm64
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout FFmpeg
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: mynameisbogdan/ServarrFFmpeg
          ref: ${{ env.FFMPEG_VERSION }}
          path: ffmpeg-src

      - name: Build
        shell: bash
        run: ./platforms/osx/build.sh ${{ matrix.architecture }}

      - name: List artifacts
        run: file platforms/*/build/opt/ffmpeg/bin/*

      - name: Display build information
        run: |
          otool -l platforms/osx/build/opt/ffmpeg/bin/ffprobe
          platforms/osx/build/opt/ffmpeg/bin/ffprobe -hide_banner -version
          platforms/osx/build/opt/ffmpeg/bin/ffprobe -hide_banner -buildconf
          platforms/osx/build/opt/ffmpeg/bin/ffprobe -hide_banner -bsfs

      - name: Prepare build artifact
        run: mkdir -p build/osx-${{ matrix.architecture }} && cp platforms/osx/build/opt/ffmpeg/bin/ffprobe build/osx-${{ matrix.architecture }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-osx-${{ matrix.architecture }}
          path: build
          if-no-files-found: error

  package:
    needs:
      - prepare
      - build_freebsd
      - build_linux
      - build_mac
      - build_windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup dotnet
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_NOLOGO: 1
        with:
          dotnet-version: '10.0.x'

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: build-*
          path: build
          merge-multiple: true

      - name: List artifacts
        run: ls -lR build

      - name: Package
        shell: bash
        run: dotnet pack -c Release -v detailed -p:Version=${{ needs.prepare.outputs.semver }}.${{ github.run_number }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages
          path: artifacts/package/release/Openur.FFprobeStatic.*.nupkg
          if-no-files-found: error

  release:
    needs:
      - prepare
      - package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' && github.ref_name == 'main'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: packages

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: build-*
          path: build
          merge-multiple: true

      - name: Archive artifacts
        run: |
          mkdir artifacts
          for runtime in build/*/; do
            runtime="${runtime%/}"
            name="${runtime##*/}"
            if [[ $name == win* ]]; then
              tar -cJf "./artifacts/ffprobe.$name.tar.xz" -C "$runtime" "ffprobe.exe"
            elif [[ $name == linux* ]] || [[ $name == osx* ]] || [[ $name == freebsd* ]]; then
              tar -cJf "./artifacts/ffprobe.$name.tar.xz" -C "$runtime" "ffprobe"
            fi
          done

      - name: Create release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: |
            packages/Openur.FFprobeStatic.*.nupkg
            artifacts/ffprobe.*
          artifactErrorsFailBuild: true
          draft: false
          generateReleaseNotes: false
          skipIfReleaseExists: true
          immutableCreate: true
          makeLatest: false
          name: v${{ needs.prepare.outputs.semver }} (build ${{ github.run_number }})
          tag: v${{ needs.prepare.outputs.semver }}.${{ github.run_number }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: packages

      - name: Push to GitHub
        shell: bash
        run: >-
          dotnet nuget push
          packages/Openur.FFprobeStatic.*.nupkg
          --no-symbols
          --skip-duplicate
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --api-key ${{ secrets.GITHUB_TOKEN }}

      - name: NuGet login
        uses: nuget/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: nuget-login
        with:
          user: Openur

      - name: Push to NuGet
        shell: bash
        run: >-
          dotnet nuget push
          packages/Openur.FFprobeStatic.*.nupkg
          --no-symbols
          --skip-duplicate
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
