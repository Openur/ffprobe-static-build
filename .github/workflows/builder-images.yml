name: Builder Images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 1 * *'
  push:
    branches:
      - main
    paths:
      - .github/workflows/builder-images.yml
      - .docker/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/builder-images.yml
      - .docker/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux
          - windows
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/ffmpeg-builder
          annotations: |
            org.opencontainers.image.title="ffmpeg-builder"
            org.opencontainers.image.description="Builder images intended for internal usage."
          labels: |
            org.opencontainers.image.title="ffmpeg-builder"
            org.opencontainers.image.description="Builder images intended for internal usage."
          tags: |
            type=raw,enable=true,value=${{ matrix.platform }}
          flavor:
            latest=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          platforms: |
            linux/arm64
            linux/amd64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .docker/${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          platforms: |
            linux/arm64
            linux/amd64
          provenance: false
