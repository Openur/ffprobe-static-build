name: Builder Images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 1 * *'
  push:
    branches:
      - main
    paths:
      - .github/workflows/builder-images.yml
      - .docker/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/builder-images.yml
      - .docker/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux
          - windows
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/ffmpeg-builder
          annotations: |
            org.opencontainers.image.title="ffmpeg-builder"
            org.opencontainers.image.description="Builder images intended for internal usage."
          labels: |
            org.opencontainers.image.title="ffmpeg-builder"
            org.opencontainers.image.description="Builder images intended for internal usage."
          tags: |
            type=raw,enable=true,value=${{ matrix.platform }}
          flavor:
            latest=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          platforms: |
            linux/arm64
            linux/amd64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .docker/${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          platforms: |
            linux/arm64
            linux/amd64
          provenance: false
